# ============================================================
# Nextcloud Fast Stack 2026 — Homelab Edition
# https://github.com/snuffomega/nextcloud-fast-stack
#
# HTTP Nextcloud stack with HTTPS tunneling options (Cloudflare/Tailscale).
# Access at: https://your-subdomain.com (via tunnel)
#
# For local HTTPS, uncomment alt ports/Caddyfile.
#
# All persistent data lives in ./data/ next to this file:
#   ./data/html/      Nextcloud app files
#   ./data/userdata/  User files
#   ./data/postgres/  PostgreSQL data
#   ./data/redis/     Redis cache & AOF
#
# Quick start:
#   1. cp .env.example .env
#   2. Set POSTGRES_PASSWORD, NEXTCLOUD_ADMIN_PASSWORD, NEXTCLOUD_DOMAIN
#   3. docker compose up -d
#   4. Visit http://localhost:8080
# ============================================================

services:

  # ── Nextcloud (PHP-FPM) ────────────────────────────────
  nextcloud:
    image: nextcloud:33-fpm-alpine
    container_name: nextcloud
    restart: unless-stopped
    depends_on:
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_HOST: nextcloud-redis
      REDIS_PORT: 6379
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?Set NEXTCLOUD_ADMIN_PASSWORD in .env}
      # Trust the primary install host plus any tunnel/local hostnames the user configures.
      NEXTCLOUD_TRUSTED_DOMAINS: >-
        ${NEXTCLOUD_DOMAIN:?Set NEXTCLOUD_DOMAIN in .env}
        ${NEXTCLOUD_EXTERNAL_HOST:+ ${NEXTCLOUD_EXTERNAL_HOST}}
        ${NEXTCLOUD_LOCAL_HOST:+ ${NEXTCLOUD_LOCAL_HOST}}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/html:/var/www/html
      - ./data/userdata:/var/www/html/data
      - ./config/php-fpm.conf:/usr/local/etc/php-fpm.d/zzz-custom.conf:ro
      - ./config/php-opcache.ini:/usr/local/etc/php/conf.d/opcache.ini:ro
    networks:
      - nextcloud_net
    healthcheck:
      test: ["CMD-SHELL", "ps aux | grep -q '[p]hp-fpm' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s

  # ── Caddy (HTTP proxy) ──────────────────────────────────
  # Listens on http://0.0.0.0:8080 (no TLS).
  # Routes PHP requests to Nextcloud FPM container.
  # For external HTTPS, use Tailscale/Cloudflare/reverse proxy
  nextcloud-caddy:
    image: caddy:2-alpine
    container_name: nextcloud-caddy
    restart: unless-stopped
    depends_on:
      nextcloud:
        condition: service_healthy
    # Default: publish TLS on host port 443. If you need a tunnel that forwards
    # to an HTTP port, configure the tunnel to forward to the host HTTP port and
    # optionally enable the mapping below (commented by default).
    ports:
      - "${CADDY_TLS_PORT:-443}:443"
    # Optional: publish HTTP for external tunnels (uncomment if you require it)
    # ports:
    #   - "${CADDY_HTTP_PORT:-8080}:8080"
    # Alternative: Uncomment the block below when you switch to local HTTPS and
    # have updated Caddyfile/TLS hosts to match NEXTCLOUD_DOMAIN (set this to the
    # certificate host/email before restarting).
    # ports:
    #   - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/html:/var/www/html:ro
    networks:
      - nextcloud_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${CADDY_HTTP_PORT:-8080}/status.php 2>/dev/null | grep -q installed || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # ── PostgreSQL 17 ─────────────────────────────────────
  nextcloud-db:
    image: postgres:17-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud} -d ${POSTGRES_DB:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_net

  # ── Redis 7 ─────────────────────────────────────────────
  # AOF persistence (--appendonly yes) protects Nextcloud file locks
  # across restarts. volatile-lru evicts only TTL-bearing cache keys,
  # leaving lock entries (which may not carry a TTL) intact.
  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: >
      redis-server
        --save ""
        --appendonly yes
        --maxmemory 512mb
        --maxmemory-policy volatile-lru
    volumes:
      - ./data/redis:/data
    networks:
      - nextcloud_net

  # ── Imaginary (optional — preview generation offloading) ──
  # Uncomment to offload thumbnail/preview generation to this
  # Go-based microservice (~60% faster previews than built-in).
  #
  # After enabling, add to Nextcloud config.php:
  #   'enabledPreviewProviders' => ['OC\Preview\Imaginary'],
  #   'preview_imaginary_url'   => 'http://imaginary:9000',
  #
  # imaginary:
  #   image: nextcloud/aio-imaginary:latest
  #   container_name: nextcloud-imaginary
  #   restart: unless-stopped
  #   environment:
  #     PORT: "9000"
  #   cap_add:
  #     - SYS_NICE
  #   networks:
  #     - nextcloud_net

  # ── Cron (background jobs) ──────────────────────────────
  # Required for activity feeds, notifications, share expiry,
  # and all app-level background tasks. Calls occ cron every 5 min.
  nextcloud-cron:
    image: nextcloud:33-fpm-alpine
    container_name: nextcloud-cron
    restart: unless-stopped
    entrypoint: ["/cron.sh"]
    depends_on:
      nextcloud:
        condition: service_healthy
    environment:
      POSTGRES_HOST: nextcloud-db
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      REDIS_HOST: nextcloud-redis
      REDIS_PORT: 6379
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/html:/var/www/html
      - ./data/userdata:/var/www/html/data
    networks:
      - nextcloud_net

  # ── Init helper (runs once) ─────────────────────────────────
  # Runs a short script to apply recommended occ fixes after the first
  # install completes. Controlled by `AUTO_INIT` in .env (true/false).
  nextcloud-init:
    image: nextcloud:33-fpm-alpine
    container_name: nextcloud-init
    restart: "no"
    depends_on:
      nextcloud:
        condition: service_healthy
      nextcloud-db:
        condition: service_healthy
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: nextcloud-redis
      REDIS_PORT: 6379
      AUTO_INIT: ${AUTO_INIT:-true}
      OVERWRITEPROTOCOL: ${OVERWRITEPROTOCOL}
      DEFAULT_PHONE_REGION: ${DEFAULT_PHONE_REGION:-US}
      MAINTENANCE_WINDOW_START: ${MAINTENANCE_WINDOW_START:-2}
    volumes:
      - ./data/html:/var/www/html:rw
      - ./data/userdata:/var/www/html/data:rw
      - ./bin/init-nextcloud.sh:/init-nextcloud.sh:ro
    entrypoint: ["/bin/sh","-c","/init-nextcloud.sh"]
    networks:
      - nextcloud_net

  # ── Backup (optional — encrypted incremental via Restic) ──
  # Uncomment to enable encrypted, deduplicated backups of user data
  # and app files. Uses restic — open-source, multi-backend.
  #
  # Before enabling:
  #   1. Set BACKUP_PASSWORD in .env — encrypts all snapshots.
  #      Losing it means permanent loss of backup access.
  #   2. Set BACKUP_REPOSITORY to a local path or remote URI:
  #        /backups/nextcloud           — local bind mount (default)
  #        s3:s3.amazonaws.com/bucket   — AWS S3
  #        b2:bucket-name               — Backblaze B2
  #        sftp:user@host:/path         — SFTP
  #   3. Set BACKUP_LOCAL_PATH to the host path (local repos only).
  #   4. Uncomment this block and restart.
  #
  # Restore:
  #   docker exec nextcloud-backup restic snapshots
  #   docker exec nextcloud-backup restic restore latest --target /restore
  #
  # Note: backs up user data + app files only. For DB backup, see README.
  #
  # nextcloud-backup:
  #   image: mazzolino/restic:1
  #   container_name: nextcloud-backup
  #   restart: unless-stopped
  #   hostname: nextcloud-backup
  #   environment:
  #     BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
  #     RESTIC_REPOSITORY: ${BACKUP_REPOSITORY:-/backups/nextcloud}
  #     RESTIC_PASSWORD: ${BACKUP_PASSWORD:?Set BACKUP_PASSWORD in .env}
  #     FORGET_ARGS: "--keep-daily 7 --keep-weekly 4 --keep-monthly 3"
  #     CHECK_CRON: "0 4 * * 1"
  #   volumes:
  #     - ./data/userdata:/source/userdata:ro
  #     - ./data/html:/source/html:ro
  #     - ${BACKUP_LOCAL_PATH:-./data/backups}:/backups
  #   networks:
  #     - nextcloud_net

# ── Networks ──────────────────────────────────────────────
networks:
  nextcloud_net:
    driver: bridge

# Data directories are created automatically by Docker on first run. 
# All data lives in ./data/ relative to this docker-compose.yml file.
