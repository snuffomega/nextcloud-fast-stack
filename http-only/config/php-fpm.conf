; Nextcloud Fast Stack — PHP-FPM Pool Configuration
; Mounted at: /usr/local/etc/php-fpm.d/zzz-custom.conf
; The zzz- prefix ensures this file loads last and overrides defaults.

[www]

; ── Listen ────────────────────────────────────────────────────
; Listen on TCP port 9000 (accessible to other containers on the network).
; Caddy connects here: "nextcloud:9000"
listen = 9000

; ── Process manager ───────────────────────────────────────────
; dynamic: scales worker count between min/max based on load.
pm = dynamic

; Max total PHP child processes that can exist simultaneously.
; Rule of thumb: (RAM_in_MB - 512) / ~40MB_per_worker
; Adjust for your hardware:
;   16GB → ~380  |  8GB → ~190  |  4GB → ~90 (keep headroom for DB + Redis)
pm.max_children = 50

pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20

; Recycle workers after N requests to prevent memory leaks.
pm.max_requests = 500

; ── Timeouts ──────────────────────────────────────────────────
; Allow 10 min for long operations: occ commands, chunked uploads.
request_terminate_timeout = 600
