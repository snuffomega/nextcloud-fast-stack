; Nextcloud Fast Stack — OPcache + JIT Configuration
; Mounted at: /usr/local/etc/php/conf.d/opcache.ini
; Requires PHP 8.1+ (nextcloud:33-fpm-alpine ships PHP 8.3)

; ── OPcache ───────────────────────────────────────────────────
opcache.enable=1
opcache.enable_cli=1
opcache.memory_consumption=256          ; MB of shared memory for compiled scripts
opcache.interned_strings_buffer=32      ; MB for interned strings (class/function names)
opcache.max_accelerated_files=20000     ; Max number of cached PHP files
opcache.revalidate_freq=60             ; Re-check source files every 60s (0 = never/prod)
opcache.save_comments=1                ; Required by Nextcloud for annotations
opcache.huge_code_pages=1              ; Use 2MB pages on Linux (minor throughput boost)

; ── JIT (PHP 8.1+, optimal on PHP 8.3) ───────────────────────
; Mode 1255 = tracing JIT — best for web request patterns.
; Set opcache.jit=0 to disable if you encounter unexpected behaviour.
opcache.jit=1255
opcache.jit_buffer_size=128M
