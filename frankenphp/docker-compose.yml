# ============================================================
# FrankenPHP — Nextcloud Fast Stack 2026
# EXPERIMENTAL: ~50–70ms TTFB via in-process PHP execution.
#
# Replaces nextcloud + caddy with a single FrankenPHP container.
# Listens internally on CADDY_PORT (default 8080) — no host
# ports are exposed. Wire to your reverse proxy the same way
# as the standard stack.
#
# First run: nextcloud-init populates app files and the DB,
# then exits. FrankenPHP starts after init completes.
# Subsequent restarts: init is skipped (restart: "no").
#
# Usage:
#   cd frankenphp
#   docker compose up -d --build
#
# Prerequisites: copy ../.env.example -> ../.env and fill in.
# ============================================================

services:

  # ── FrankenPHP (PHP + Caddy, single container) ──────────
  nextcloud:
    build:
      context: ..
      dockerfile: frankenphp/Dockerfile
    container_name: nextcloud-frankenphp
    restart: unless-stopped
    depends_on:
      nextcloud-init:
        condition: service_completed_successfully
      nextcloud-db:
        condition: service_healthy
      nextcloud-redis:
        condition: service_started
    environment:
      # FrankenPHP's embedded Caddy listens on CADDY_PORT (no TLS).
      # Your reverse proxy connects to this port on the Docker network.
      SERVER_NAME: ":${CADDY_PORT:-8080}"
      REDIS_HOST: nextcloud-redis
      REDIS_PORT: 6379
      TZ: ${TZ:-UTC}
    volumes:
      - html:/var/www/html
      - nextcloud_data:/var/www/html/data
    # No ports: block -- internal only, same pattern as the standard stack
    networks:
      - nextcloud_net

  # ── Init (one-shot setup) ────────────────────────────────
  # Uses the official Nextcloud image to copy app files and
  # run occ maintenance:install into the shared html volume,
  # then exits. FrankenPHP takes over as the PHP runtime.
  nextcloud-init:
    image: nextcloud:33-fpm-alpine
    container_name: nextcloud-init
    restart: "no"
    entrypoint: ["/entrypoint.sh"]
    command: ["true"]       # Run entrypoint (setup + install), then exit 0
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-nextcloud-db}
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in ../.env}
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:?Set NEXTCLOUD_ADMIN_PASSWORD in ../.env}
      NEXTCLOUD_TRUSTED_DOMAINS: ${NEXTCLOUD_DOMAIN}
    volumes:
      - html:/var/www/html
      - nextcloud_data:/var/www/html/data
    depends_on:
      nextcloud-db:
        condition: service_healthy
    networks:
      - nextcloud_net

  # ── PostgreSQL 17 ────────────────────────────────────────
  nextcloud-db:
    image: postgres:17-alpine
    container_name: nextcloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nextcloud}
      POSTGRES_USER: ${POSTGRES_USER:-nextcloud}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in ../.env}
      TZ: ${TZ:-UTC}
    volumes:
      - nextcloud_db:/var/lib/postgresql/data
      - ../config/postgres.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nextcloud} -d ${POSTGRES_DB:-nextcloud}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nextcloud_net

  # ── Redis 7 ─────────────────────────────────────────────
  nextcloud-redis:
    image: redis:7-alpine
    container_name: nextcloud-redis
    restart: unless-stopped
    command: >
      redis-server
        --save ""
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
    volumes:
      - nextcloud_redis:/data
    networks:
      - nextcloud_net

# ── Networks ────────────────────────────────────────────────
networks:
  nextcloud_net:
    driver: bridge
  # proxynet:        # Uncomment for Traefik
  #   external: true

# ── Volumes ─────────────────────────────────────────────────
volumes:
  html:
  nextcloud_data:
  nextcloud_db:
  nextcloud_redis:
