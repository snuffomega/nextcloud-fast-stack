# PostgreSQL 17 Performance Tuning — Nextcloud Fast Stack
# Target: 4–8 vCPU, 8–16GB RAM, SSD/NVMe storage
# Applied via: command: postgres -c config_file=/etc/postgresql/postgresql.conf
#
# Adjust shared_buffers / effective_cache_size based on your host RAM:
#   16GB host → shared_buffers = 4GB, effective_cache_size = 12GB
#   8GB  host → shared_buffers = 2GB, effective_cache_size = 6GB  (defaults below)
#   4GB  host → shared_buffers = 1GB, effective_cache_size = 3GB

# ── Memory ────────────────────────────────────────────────────
shared_buffers = 256MB              # ~25% of available RAM
effective_cache_size = 768MB        # ~75% of RAM for query planning
work_mem = 16MB                     # Per-operation; total = work_mem × max_connections
maintenance_work_mem = 128MB        # Used by VACUUM, CREATE INDEX, pg_restore

# ── WAL / Checkpoints ─────────────────────────────────────────
wal_buffers = 64MB
checkpoint_completion_target = 0.9  # Spread writes over 90% of checkpoint interval
min_wal_size = 1GB
max_wal_size = 4GB

# ── Planner (SSD optimised) ───────────────────────────────────
random_page_cost = 1.1              # SSD: near sequential cost; HDD default is 4.0
effective_io_concurrency = 200      # SSD: high parallel I/O capability
default_statistics_target = 100

# ── Connections ───────────────────────────────────────────────
max_connections = 100

# ── Logging (minimal overhead) ────────────────────────────────
log_min_duration_statement = 1000   # Log queries taking > 1s (useful for debugging)
log_timezone = 'UTC'
